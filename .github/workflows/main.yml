name: Pipeline CI/CD
run-name: Pipeline CI/CD executada por ${{ github.actor }} em ${{ github.run_number }} # Exibe o nome do usuário e o número da execução
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Obtendo o codigo do projeto
        uses: actions/checkout@v4
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.300'
      - name: Build the Docker image
        working-directory: ./src/
        run: dotnet build Review-Filmes.sln
  release:
    name: Criação de release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Obtendo o codigo do projeto
        uses: actions/checkout@v4
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
      - name: Efetuando o login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image

        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./src/
          file: ./src/Review-Filmes.Web/Dockerfile
          tags: |
            edymonte/review-filmes:latest
            edymonte/review-filmes:${{ github.run_number }}

